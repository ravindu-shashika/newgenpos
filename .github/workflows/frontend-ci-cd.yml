name: Frontend CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - 'pos-client/**'
      - '.github/workflows/frontend-ci-cd.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pos-client

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pos-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Laravel on cPanel: https://pos.newgenideas.com/api
          VITE_APP_DEFAULT_PATH: ${{ secrets.VITE_APP_DEFAULT_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pos-client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pos-client

      - name: Build
        run: npm run build
        working-directory: pos-client
        env:
          # Laravel on cPanel: https://pos.newgenideas.com/api
          VITE_APP_DEFAULT_PATH: ${{ secrets.VITE_APP_DEFAULT_PATH }}

      - name: Deploy frontend to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./pos-client/dist/
          server-dir: /
          security: loose
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
