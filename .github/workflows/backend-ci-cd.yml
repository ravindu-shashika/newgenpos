name: Backend CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'pos-api-new/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'pos-api-new/**'
      - '.github/workflows/backend-ci-cd.yml'

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel_test
      DB_USERNAME: root
      DB_PASSWORD: password
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync

    defaults:
      run:
        working-directory: pos-api-new

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, sqlite, pdo_sqlite, mysql, bcmath, gd
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate key
        run: php artisan key:generate

      - name: Directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Execute tests
        run: vendor/bin/phpunit

  deploy:
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect Composer dependency changes
        id: deps
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- pos-api-new/composer.lock pos-api-new/composer.json | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup PHP
        if: steps.deps.outputs.changed == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, sqlite, pdo_sqlite, mysql, bcmath, gd

      - name: Install production dependencies
        if: steps.deps.outputs.changed == 'true'
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --no-dev --optimize-autoloader
        working-directory: pos-api-new

      - name: Deploy application code (incremental FTP sync)
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./pos-api-new/
          server-dir: api/
          state-name: .ftp-deploy-sync-state.json
          log-level: minimal
          security: strict
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/vendor/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.*
            **/bootstrap/cache/**
            **/storage/**
            **/public/storage/**

      - name: Deploy vendor when dependencies changed (incremental FTP sync)
        if: steps.deps.outputs.changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./pos-api-new/vendor/
          server-dir: api/vendor/
          state-name: .ftp-deploy-sync-state.json
          log-level: minimal
          security: strict
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
